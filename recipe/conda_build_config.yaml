# CUDA 12.9 is rejected by PyTorch's CUDA extension checks with GCC >=14.
cuda_compiler_version:  # [linux]
  - None                # [linux]
  - '12.9'              # [linux]

cxx_compiler_version:   # [linux]
  - '14'                # [linux]
  - '13'                # [linux]

c_stdlib_version:       # [linux]
  - '2.17'              # [linux]
  - '2.17'              # [linux]
